<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0D1117; }
    .border { fill: none; stroke: #30363D; stroke-width: 2; }

    .title {
      fill: #F0F6FC;
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 36px;
      font-weight: 700;
    }

    .subtitle,
    .heading,
    .label,
    .status {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }

    .subtitle {
      fill: #8B949E;
      font-size: 17px;
    }

    .heading {
      fill: #8B949E;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .label {
      fill: #C9D1D9;
      font-size: 17px;
    }

    .status {
      fill: #3FB950;
      font-size: 17px;
      animation: statusFade 3.2s ease-in-out infinite;
    }

    .dot1,
    .dot2,
    .dot3 {
      fill: #3FB950;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .dot2 { animation-delay: 0.4s; }
    .dot3 { animation-delay: 0.8s; }

    .status2 { animation-delay: 0.4s; }
    .status3 { animation-delay: 0.8s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }

    @keyframes statusFade {
      0%, 100% { opacity: 0.78; }
      50% { opacity: 1; }
    }
  </style>

  <rect class="bg" width="900" height="260" rx="18"/>
  <rect class="border" x="1" y="1" width="898" height="258" rx="18"/>

  <text class="title" x="450" y="55" text-anchor="middle">
    Lead Solutions Engineer
  </text>

  <text class="subtitle" x="450" y="82" text-anchor="middle">
    AI | APIs | Automation
  </text>

  <line
    x1="50"
    y1="105"
    x2="850"
    y2="105"
    stroke="#30363D"
    stroke-width="1"
  />

  <text class="heading" x="50" y="135">
    CURRENT FOCUS
  </text>

  <circle class="dot1" cx="58" cy="168" r="7"/>
  <text class="label" x="80" y="174">
    AI Solutions
  </text>
  <text class="status" x="700" y="174">
    Building
  </text>

  <circle class="dot2" cx="58" cy="202" r="7"/>
  <text class="label" x="80" y="208">
    Enterprise Plugins
  </text>
  <text class="status status2" x="700" y="208">
    Shipping
  </text>

  <circle class="dot3" cx="58" cy="236" r="7"/>
  <text class="label" x="80" y="242">
    Custom Integrations
  </text>
  <text class="status status3" x="700" y="242">
    Active
  </text>
</svg>
