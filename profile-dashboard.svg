<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0D1117; }
    .border { fill: none; stroke: #30363D; stroke-width: 2; }
    .title { fill: #F0F6FC; font: 700 34px Arial, sans-serif; }
    .label { fill: #C9D1D9; font: 18px Arial, sans-serif; }
    .status { fill: #3FB950; font: 18px Arial, sans-serif; }
    .sub { fill: #8B949E; font: 17px Arial, sans-serif; }

    .dot1, .dot2, .dot3 {
      fill: #3FB950;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .dot2 { animation-delay: 0.4s; }
    .dot3 { animation-delay: 0.8s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
  </style>

  <rect class="bg" width="900" height="260" rx="18"/>
  <rect class="border" x="1" y="1" width="898" height="258" rx="18"/>

  <text class="sub" x="50" y="48">AI SYSTEMS</text>

  <circle class="dot1" cx="55" cy="88" r="7"/>
  <text class="label" x="80" y="94">AI Agents</text>
  <text class="status" x="700" y="94">Online</text>

  <circle class="dot2" cx="55" cy="128" r="7"/>
  <text class="label" x="80" y="134">Enterprise APIs</text>
  <text class="status" x="700" y="134">Connected</text>

  <circle class="dot3" cx="55" cy="168" r="7"/>
  <text class="label" x="80" y="174">Integrations</text>
  <text class="status" x="700" y="174">Running</text>

  <text class="title" x="50" y="220">Lead Solutions Engineer</text>
  <text class="sub" x="690" y="220">AI | APIs | Automation</text>
</svg>
