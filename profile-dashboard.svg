<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0D1117; }
    .border { fill: none; stroke: #30363D; stroke-width: 2; }

    .title {
      fill: #F0F6FC;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 40px;
      font-weight: 700;
    }

    .subtitle {
      fill: #8B949E;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
    }

    .heading {
      fill: #8B949E;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 600;
    }

    .label {
      fill: #C9D1D9;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
    }

    .status {
      fill: #3FB950;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
    }

    .dot1,
    .dot2,
    .dot3 {
      fill: #3FB950;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .dot2 { animation-delay: .4s; }
    .dot3 { animation-delay: .8s; }

    @keyframes pulse {
      0%,100% { opacity:.35; }
      50% { opacity:1; }
    }
  </style>

  <rect class="bg" width="900" height="260" rx="18"/>
  <rect class="border" x="1" y="1" width="898" height="258" rx="18"/>

  <!-- Title -->

  <text
    class="title"
    x="450"
    y="55"
    text-anchor="middle">
    Lead Solutions Engineer
  </text>

  <text
    class="subtitle"
    x="450"
    y="82"
    text-anchor="middle">
    AI | APIs | Automation
  </text>

  <line
    x1="50"
    y1="105"
    x2="850"
    y2="105"
    stroke="#30363D"
    stroke-width="1"/>

  <!-- Dashboard -->

  <text class="heading" x="50" y="135">
    AI SYSTEMS
  </text>

  <circle class="dot1" cx="58" cy="168" r="7"/>
  <text class="label" x="80" y="174">
    AI Agents
  </text>
  <text class="status" x="700" y="174">
    Online
  </text>

  <circle class="dot2" cx="58" cy="202" r="7"/>
  <text class="label" x="80" y="208">
    Enterprise APIs
  </text>
  <text class="status" x="700" y="208">
    Connected
  </text>

  <circle class="dot3" cx="58" cy="236" r="7"/>
  <text class="label" x="80" y="242">
    Integrations
  </text>
  <text class="status" x="700" y="242">
    Running
  </text>

</svg>
